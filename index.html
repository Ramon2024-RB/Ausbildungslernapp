<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ausbildungs Akademie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(
180deg,
#2563eb,
#0f172a
);

min-height:100vh;
color:white;
}

.screen{
display:none;
padding:25px;
}

.active{
display:block;
}

.logo{

font-size:34px;

margin-top:40px;

font-weight:bold;

}

.welcome{

margin-top:10px;

opacity:.8;

}

.card{

background:white;

color:black;

padding:22px;

border-radius:20px;

margin-top:18px;

}

.button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

font-size:18px;

margin-top:15px;

cursor:pointer;

}

.primary{

background:#2563eb;

color:white;

}

.dark{

background:#111827;

color:white;

}

.gray{

background:#e5e7eb;

}

.stat{

font-size:32px;

color:#2563eb;

font-weight:bold;

}

.select{

padding:18px;

border-radius:14px;

background:#f5f5f5;

margin-top:10px;

cursor:pointer;

}

.bottom{

margin-top:30px;

display:flex;

gap:10px;

}

.bottom button{

flex:1;

}

</style>

</head>

<body>

<div
id="home"
class="screen active"
>

<div class="logo">

📘 Ausbildungs Akademie

</div>

<div class="welcome">

Willkommen zurück.

Wähle eine Ausbildung
oder lerne weiter.

</div>

<div class="card">

<h2>

Weiterlernen

</h2>

<p>

Zuletzt geöffnet:
Pflege

</p>

<button
class="button primary"
onclick="openLearning()"
>

Weiterlernen

</button>

</div>

<div class="card">

<h2>

Ausbildungen

</h2>

<div
class="select"
onclick="start('Pflege')"
>

🏥 Pflege

</div>

<div
class="select"
onclick="start('Kfz')"
>

🚗 Kfz

</div>

<div
class="select"
onclick="start('Büro')"
>

💼 Büro

</div>

<div
class="select"
onclick="start('Einzelhandel')"
>

🛒 Einzelhandel

</div>

</div>

<div class="card">

<h2>

Dein Fortschritt

</h2>

<div class="stat">

72%

</div>

<p>

124 Fragen abgeschlossen

</p>

</div>

<div class="bottom">

<button
class="button gray"
onclick="settings()"
>

⚙ Einstellungen

</button>

<button
class="button dark"
onclick="profile()"
>

👤 Profil

</button>

</div>

</div>

<div
id="learn"
class="screen"
>

<div class="card">

<h1>

Lernbereich

</h1>

<p
id="course"
>

</p>

<button
class="button primary"
>

Quiz starten

</button>

<button
class="button dark"
onclick="home()"
>

← Zur Startseite

</button>

</div>

</div>

<script>

function show(id){

document
.querySelectorAll(
".screen"
)

.forEach(
s=>
s.classList
.remove(
"active"
)
)

document
.getElementById(
id
)

.classList
.add(
"active"
)

}

function start(name){

document
.getElementById(
"course"
)

.innerHTML=

"Ausgewählt: "

+

name

show(
"learn"
)

}

function home(){

show(
"home"
)

}

function settings(){

alert(
"Einstellungen kommen später"
)

}

function profile(){

alert(
"Profil kommt später"
)

}

function openLearning(){

show(
"learn"
)

}

</script>

</body>

</html>
