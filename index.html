<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ausbildungs Lernapp</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

.correct{
background:#16a34a !important;
}

.wrong{
background:#dc2626 !important;
}
</style>

</head>

<body>

<div class="container">

<h1>Ausbildungs Lernapp</h1>

<h3 id="category"></h3>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>

</div>

<script>

const questions = [

{
category:"Pflege",
question:"Wie lange dauert eine Händedesinfektion?",
answers:[
"5 Sekunden",
"30 Sekunden",
"2 Minuten",
"Nicht nötig"
],
correct:1
},

{
category:"Kfz",
question:"Was macht die Kupplung?",
answers:[
"Kühlt Motor",
"Verbindet Motor und Getriebe",
"Lädt Batterie",
"Steuert Licht"
],
correct:1
}

];

let current=0;

function showQuestion(){

const q=questions[current];

document.getElementById("category").innerText=
q.category;

document.getElementById("question").innerText=
q.question;

const area=
document.getElementById("answers");

area.innerHTML="";

q.answers.forEach((answer,index)=>{

const btn=
document.createElement("button");

btn.innerText=answer;

btn.onclick=()=>check(index);

area.appendChild(btn);

});

}

function check(index){

const q=questions[current];

const buttons=
document.querySelectorAll("button");

buttons.forEach(btn=>btn.disabled=true);

if(index===q.correct){

buttons[index].classList.add("correct");

document.getElementById("result")
.innerText="Richtig";

}else{

buttons[index].classList.add("wrong");

buttons[q.correct].classList.add("correct");

document.getElementById("result")
.innerText="Falsch";

}

setTimeout(()=>{

current++;

if(current>=questions.length){

current=0;

alert("Quiz beendet");

}

document.getElementById("result")
.innerText="";

showQuestion();

},2000);

}

showQuestion();

</script>

</body>

</html>
